{% extends "layout/base.html" %}

{% block title %}Account Profile - CareerAI{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">
          <h2 class="h4 mb-3">Account Profile</h2>
          <p class="text-muted mb-4">This page shows your verified account details. Continue to dashboard for career analysis.</p>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label text-muted">Name</label>
              <input class="form-control" type="text" value="{{ user.name if user else '' }}" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted">Email</label>
              <input class="form-control" type="email" value="{{ user.email if user else '' }}" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted">Verification Status</label>
              <input class="form-control" type="text" value="{{ 'Verified' if user and user.email_verified else 'Pending' }}" readonly>
            </div>
            <div class="col-md-6">
              <label class="form-label text-muted">Role</label>
              <input class="form-control" type="text" value="{{ user.role if user else 'user' }}" readonly>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-2">
            <a href="/dashboard" class="btn btn-primary">
              <i class="fas fa-gauge-high me-2"></i>Go to Dashboard
            </a>
            <a href="/logout" class="btn btn-outline-secondary">
              <i class="fas fa-right-from-bracket me-2"></i>Logout
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
